
<div class="app-container">
  <ng-container *ngIf="showNav()">
    <ng-container *ngIf="isGuest(); else registeredNav">
      <app-unregistered-nav-bar></app-unregistered-nav-bar>
    </ng-container>
    <ng-template #registeredNav>
      <app-nav-bar></app-nav-bar>
    </ng-template>
  </ng-container>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
